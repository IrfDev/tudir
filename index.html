<title>Mapa Circular TIUD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    width: 100vw;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
    padding: 24px;
  }
  svg {
    width: min(100vw, 1300px);
    height: auto;
    background: #000;
    font-family: "Courier New", monospace;
  }
  .guide-circle, .axis-line, .inner-grid {
    stroke: #2a2a28;
    fill: none;
    vector-effect: non-scaling-stroke;
  }
  .guide-circle { stroke-width: 1.2; }
  .axis-line { stroke-width: 1; }
  .inner-grid {
    stroke-width: 0.9;
    shape-rendering: crispEdges;
  }

  .highlight-column {
    fill: #ffffff;
    fill-opacity: 0.08;
    stroke: #ffffff;
    stroke-opacity: 0.22;
    stroke-width: 0.8;
    pointer-events: none;
  }
  .highlight-row {
    fill: none;
    stroke: #ffffff;
    stroke-opacity: 0.24;
    pointer-events: none;
  }

  .legend-box { stroke: none; }
  .legend-label {
    fill: #0d0d0d;
    font-size: 12.6px;
    letter-spacing: 0.2px;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: fill 120ms ease;
  }
  .legend-item,
  .ring-label {
    cursor: pointer;
  }
  .legend-item.is-active .legend-box {
    stroke: #fff;
    stroke-width: 1;
  }
  .legend-item.is-active .legend-label {
    fill: #fff;
  }

  .cell rect {
    stroke: none;
    rx: 0.8;
    transition: transform 220ms ease, opacity 180ms ease, filter 220ms ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .cell text {
    fill: #0b0b0b;
    font-size: 7px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: transform 220ms ease, fill 180ms ease, opacity 180ms ease;
  }
  .cell {
    cursor: pointer;
    transition: opacity 180ms ease;
  }
  .cell.is-active rect {
    stroke: #ffffff;
    stroke-width: 0.9;
    animation: axisPulse 1.45s ease-in-out infinite;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.35));
  }
  .cell.is-active text {
    fill: #050505;
    animation: textPulse 1.45s ease-in-out infinite;
  }
  .cell.is-focus rect {
    animation: focusPulse 0.7s ease-in-out infinite alternate;
    transform: scale(1.12);
    filter: drop-shadow(0 0 9px rgba(255,255,255,0.7));
  }
  .cell.is-focus text {
    transform: scale(1.06);
  }
  .cell.is-dimmed {
    opacity: 0.18;
  }

  .ring-label {
    fill: #2a2a28;
    font-size: 11px;
    letter-spacing: 1px;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: fill 120ms ease;
  }
  .ring-label.is-active {
    fill: #f3f3f3;
  }
  .divider-bottom {
    stroke: #2a2a28;
    stroke-width: 1.2;
    vector-effect: non-scaling-stroke;
  }
  .section-title {
    fill: #2a2a28;
    font-size: 15px;
    font-weight: 700;
    transition: fill 120ms ease;
  }
  .section-line {
    fill: #2a2a28;
    font-size: 6.3px;
    letter-spacing: 0.1px;
    transition: fill 120ms ease;
  }
  .section-title.is-active,
  .section-line.is-active {
    fill: #f1f1f1;
    animation: textGlow 1.2s ease-in-out infinite alternate;
  }
  .legend-item.is-active .legend-label {
    animation: textGlow 1.2s ease-in-out infinite alternate;
  }

  @keyframes axisPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  @keyframes focusPulse {
    0% { transform: scale(1.08); }
    100% { transform: scale(1.16); }
  }
  @keyframes textPulse {
    0% { opacity: 0.92; }
    50% { opacity: 1; }
    100% { opacity: 0.92; }
  }
  @keyframes textGlow {
    0% { fill: #f1f1f1; opacity: 0.9; }
    100% { fill: #ffffff; opacity: 1; }
  }
</style>
</head>

      .sort((a, b) => a.n - b.n)

    }
    return el;
  };

    const rad = deg * Math.PI / 180;
    return {
      x: cx + Math.cos(rad) * r,
      y: cy - Math.sin(rad) * r
    };
  };

    B: { outer: rings[1], inner: rings[2] },

  };

    ["C", []],
    ["D", []]
  ]);
  const legendItemsByCategory = new Map();
  const sectionTitleByLevel = new Map();
  const sectionLineByNumber = new Map();
  const describeColumnPolygon = (axis, innerR, outerR, steps = 10) => {
    const a0 = lineAngle(axis);
    const a1 = lineAngle(axis + 1);
    const outerPts = [];
    const innerPts = [];
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const a = a0 + (a1 - a0) * t;
      outerPts.push(polar(a, outerR));
    }
    for (let i = steps; i >= 0; i--) {
      const t = i / steps;
      const a = a0 + (a1 - a0) * t;
      innerPts.push(polar(a, innerR));
    }
    const points = [...outerPts, ...innerPts];
    return points.map((p) => `${p.x},${p.y}`).join(" ");
  };

    if (criteria.category && cell.category !== criteria.category) return false;
    if (criteria.level && cell.level !== criteria.level) return false;
    if (criteria.n && cell.n !== criteria.n) return false;
    return true;
  };

    const matched = matchingCells(criteria);
    const activeCategories = new Set(matched.map((cell) => cell.category));

      item.classList.toggle("is-active", activeCategories.has(item.dataset.category));
    });
    sectionTitleByLevel.forEach((title, level) => {
      title.classList.toggle("is-active", activeLevels.has(level));
    });

    levelLabels.forEach((labels, level) => {
      labels.forEach((label) => {
        label.classList.toggle("is-active", activeLevels.has(level));
      });
    });
  };

    legendItemsByCategory.forEach((item) => item.classList.remove("is-active"));

      const active = cellMatches(groupCell, cellCriteria);
      group.classList.toggle("is-active", active);
      group.classList.toggle("is-dimmed", !active);
    });
    setTextHighlight(cellCriteria, focusNumber);
  };
  const clearHighlight = () => {
    rowHighlight.setAttribute("opacity", "0");
    columnHighlight.setAttribute("opacity", "0");
    allCellGroups.forEach((group) => {
      group.classList.remove("is-active");
      group.classList.remove("is-dimmed");
    });
    clearTextHighlight();
  };

  selectedCells.forEach((cell) => {
    const deg = axisCenterAngle(cell.axis);
    const radius = columnRadius[cell.level];
    const point = polar(deg, radius);

    const g = create("g", {
      class: "cell",
      transform: `translate(${point.x} ${point.y}) rotate(${-deg})`
    });
    g.dataset.axis = String(cell.axis);
    g.dataset.level = cell.level;
    g.dataset.category = cell.category;
    g.dataset.n = String(cell.n);

    g.appendChild(create("rect", {
      x: -9.8,
      y: -6.4,
      width: 19.6,
      height: 12.8,
      fill: categoryColors[cell.category]
    }));

    const t = create("text", { x: 0, y: 0.2 });
    t.textContent = String(cell.n).padStart(2, "0");
    g.appendChild(t);

    g.addEventListener("mouseenter", () => {
      if (lockedTarget) return;
      if (focusCell) focusCell.classList.remove("is-focus");
      focusCell = g;
      focusCell.classList.add("is-focus");
      setHighlight({ category: cell.category }, cell.n);
    });
    g.addEventListener("mouseleave", () => {
      if (lockedTarget) return;
      g.classList.remove("is-focus");
      focusCell = null;
      clearHighlight();
    });
    g.addEventListener("click", () => {
      if (lockedTarget === g) {
        lockedTarget = null;
        g.classList.remove("is-focus");
        focusCell = null;
        clearHighlight();
        return;
      }
      lockedTarget = g;
      if (focusCell && focusCell !== g) {
        focusCell.classList.remove("is-focus");
      }
      focusCell = g;
      g.classList.add("is-focus");
      setHighlight({ category: cell.category }, cell.n);
    });
    g.addEventListener("dblclick", (event) => {
      event.preventDefault();
      event.stopPropagation();
      const url = resolveCellUrl(cell);
      window.open(url, "_blank", "noopener,noreferrer");
    });

    allCellGroups.push(g);
    cellsGroup.appendChild(g);
  });

  const clearLockedSelection = () => {
    lockedTarget = null;
    if (focusCell) {
      focusCell.classList.remove("is-focus");
      focusCell = null;
    }
    clearHighlight();
  };

  svg.addEventListener("click", (event) => {
    if (event.target.closest(".cell")) return;
    if (event.target.closest(".legend-item")) return;
    if (event.target.classList.contains("ring-label")) return;
    clearLockedSelection();
  });

  const legendX = 84.197;
  const legendY = 173.539;
  const legendW = 89.116;
  const legendH = 16.652;
  const legendGap = 13.231;

  categories.forEach((name, index) => {
    const y = legendY + index * (legendH + legendGap);
    const legendItem = create("g", {
      class: "legend-item",
      "data-category": name
    });
    legendItem.appendChild(create("rect", {
      x: legendX,
      y,
      width: legendW,
      height: legendH,
      fill: categoryColors[name],
      class: "legend-box"
    }));
    const label = create("text", {
      x: legendX + (legendW / 2),
      y: y + legendH / 2 + 0.4,
      class: "legend-label"
    });
    label.textContent = name.toUpperCase();
    legendItem.appendChild(label);
    legendItem.addEventListener("mouseenter", () => {
      if (lockedTarget) return;
      if (focusCell) {
        focusCell.classList.remove("is-focus");
        focusCell = null;
      }
      setHighlight({ category: name });
    });
    legendItem.addEventListener("mouseleave", () => {
      if (lockedTarget) return;
      clearHighlight();
    });
    legendItem.addEventListener("click", () => {
      if (lockedTarget === legendItem) {
        clearLockedSelection();
        return;
      }
      if (focusCell) {
        focusCell.classList.remove("is-focus");
        focusCell = null;
      }
      lockedTarget = legendItem;
      setHighlight({ category: name });
    });
    legendItemsByCategory.set(name, legendItem);
    legendGroup.appendChild(legendItem);
  });

  gridGroup.appendChild(create("line", {
    x1: 84.2,
    y1: 510.5,
    x2: 703.9,
    y2: 510.5,
    class: "divider-bottom"
  }));

  sectionColumns.forEach((section) => {
    const sectionLevel = section.title.slice(0, 1);
    const title = create("text", {
      x: section.x,
      y: section.y,
      class: "section-title"
    });
    title.textContent = section.title;
    sectionTitleByLevel.set(sectionLevel, title);
    gridGroup.appendChild(title);

    section.lines.forEach((line, index) => {
      const t = create("text", {
        x: section.x,
        y: section.y + 12 + (index * 7.2),
        class: "section-line"
      });
      t.textContent = line;
      const match = line.match(/^(\d{2})\./);
      if (match) {
        sectionLineByNumber.set(Number(match[1]), t);
      }
      gridGroup.appendChild(t);
    });
  });

  levelLabels.forEach((labels, level) => {
    labels.forEach((label) => {
      label.addEventListener("mouseenter", () => {
        if (lockedTarget) return;
        if (focusCell) {
          focusCell.classList.remove("is-focus");
          focusCell = null;
        }
        setHighlight({ level });
      });
      label.addEventListener("mouseleave", () => {
        if (lockedTarget) return;
        clearHighlight();
      });
      label.addEventListener("click", () => {
        if (lockedTarget === label) {
          clearLockedSelection();
          return;
        }
        if (focusCell) {
          focusCell.classList.remove("is-focus");
          focusCell = null;
        }
        lockedTarget = label;
        setHighlight({ level });
      });
    });
  });

  const fitLegendLabels = () => {
    const maxWidth = legendW - 8;
    legendItemsByCategory.forEach((item) => {
      const label = item.querySelector(".legend-label");
      if (!label) return;
      const baseSize = 12.6;
      label.style.fontSize = `${baseSize}px`;
      const width = label.getComputedTextLength();
      if (width <= maxWidth) return;
      const scaled = Math.max(8.2, baseSize * (maxWidth / width));
      label.style.fontSize = `${scaled}px`;
      label.setAttribute("lengthAdjust", "spacingAndGlyphs");
      label.setAttribute("textLength", `${maxWidth}`);
    });
  };
  fitLegendLabels();
</script>


</body></html>
